[target.aarch64-unknown-uefi]
linker = "/Users/vishweshadla/.rustup/toolchains/nightly-aarch64-apple-darwin/lib/rustlib/aarch64-apple-darwin/bin/rust-lld"
rustflags = ["-C", "linker-flavor=lld-link"]

# build-std is specified explicitly on the CLI when building for UEFI:
#   cargo +nightly build -Z build-std=core,compiler_builtins -Z build-std-features=compiler-builtins-mem \
#     --target aarch64-unknown-uefi -p hypervisor
#
# Keeping build-std here (in [unstable]) prevents `cargo test` from running
# because it rebuilds core globally, causing a duplicate-lang-item error when
# the test binary also links against the system sysroot core.
